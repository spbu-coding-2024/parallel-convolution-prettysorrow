<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI Reports — Convolution</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            background: #f7f7f5;
            color: #1a1a1a;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid #ddd;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        header p {
            font-size: 0.875rem;
            color: #666;
            margin-top: 0.25rem;
        }

        section {
            margin-bottom: 2.5rem;
        }

        h2 {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555;
            margin-bottom: 1rem;
        }

        img {
            display: block;
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
        }

        pre {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1rem 1.25rem;
            font-size: 0.825rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #1a1a1a;
        }

        pre.error {
            color: #b00020;
        }
    </style>
</head>

<body>

    <header>
        <h1>Convolution – CI Reports</h1>
        <p id="timestamp">—</p>
    </header>

    <section>
        <h2>Benchmark</h2>
        <img src="Convolution.Measurement.Benchmark-report.png" alt="Benchmark chart">
    </section>

    <section>
        <h2>Coverage</h2>
        <pre id="coverage">Loading…</pre>
    </section>

    <script>
        document.getElementById('timestamp').textContent =
            'Generated ' + new Date(document.lastModified).toUTCString();

        fetch('coverage-summary.txt')
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
            .then(t => { document.getElementById('coverage').textContent = t; })
            .catch(e => {
                const el = document.getElementById('coverage');
                el.textContent = 'Failed to load: ' + e.message;
                el.classList.add('error');
            });
    </script>

</body>

</html>
